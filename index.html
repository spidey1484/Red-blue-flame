<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Fire Engine | Dark Mode & Dynamic Lighting</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1);
        }

        video {
            display: none;
        }
    </style>
</head>

<body>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        let startTime = null;

        let particles = [];
        let lightningBolts = [];

        let currentPower = 'fire_ice';
        let lightningIntensity = 0;

        function spawnFire(x, y) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() * -10) - 4,
                life: 1,
                size: Math.random() * 20 + 10
            });
        }

        function spawnLightning(x, y) {
            const bolt = [];
            let cx = x, cy = y;
            for (let i = 0; i < 20; i++) {
                bolt.push({ x: cx, y: cy });
                cx += (Math.random() - 0.5) * 60;
                cy += (Math.random() - 0.8) * 60;
            }
            lightningBolts.push({ path: bolt, life: 1 });
        }

        function isHandOpen(landmarks) {
            let open = 0;
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            for (let i = 0; i < tips.length; i++) {
                if (Math.hypot(landmarks[tips[i]].x - wrist.x, landmarks[tips[i]].y - wrist.y) >
                    Math.hypot(landmarks[pips[i]].x - wrist.x, landmarks[pips[i]].y - wrist.y)) open++;
            }
            return open >= 3;
        }

        function onResults(results) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 🔥 brightness boost
            canvasCtx.filter = 'brightness(1.2) contrast(1.05)';

            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 🔧 reduced darkness
            canvasCtx.globalCompositeOperation = 'multiply';
            const darkAlpha = 0.25;
            canvasCtx.fillStyle = `rgba(10, 5, 0, ${darkAlpha})`;
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalCompositeOperation = 'source-over';

            // ⚠️ reset filter (important)
            canvasCtx.filter = 'none';

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks) => {
                    if (!isHandOpen(landmarks)) return;

                    const palm = landmarks[9];
                    const x = palm.x * canvasElement.width;
                    const y = palm.y * canvasElement.height;

                    spawnFire(x, y);

                    if (Math.random() < 0.3) {
                        spawnLightning(x, y);
                    }
                });
            }

            canvasCtx.globalCompositeOperation = 'lighter';

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    let g = canvasCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    g.addColorStop(0, `rgba(255,200,0,${p.life})`);
                    g.addColorStop(1, 'rgba(0,0,0,0)');
                    canvasCtx.fillStyle = g;
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    canvasCtx.fill();
                }
            });

            lightningBolts.forEach((b, i) => {
                b.life -= 0.1;
                if (b.life <= 0) {
                    lightningBolts.splice(i, 1);
                } else {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(b.path[0].x, b.path[0].y);
                    for (let j = 1; j < b.path.length; j++) {
                        canvasCtx.lineTo(b.path[j].x, b.path[j].y);
                    }
                    canvasCtx.strokeStyle = '#00bfff';
                    canvasCtx.lineWidth = 3;
                    canvasCtx.stroke();
                }
            });
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        camera.start();
    </script>
</body>

</html>
